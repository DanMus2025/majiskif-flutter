name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping KESE Cloud health endpoint
        run: |
          curl -fsS --max-time 30 --retry 2 --retry-delay 5 https://majiskif-kese-cloud-api.onrender.com/health
